<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>Coin Drop Game</title>
    <style>
      :root {
        font-family: "Helvetica Neue", Arial, sans-serif;
        color: #fff;
      }

      body {
        margin: 0;
        background: radial-gradient(circle at top, #7c3aed, #4c1d95);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        min-height: 100vh;
      }

      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: 320px;
        margin: 24px 0 8px;
        font-weight: 600;
      }

      .level {
        text-transform: uppercase;
        font-size: 14px;
        letter-spacing: 1px;
        opacity: 0.9;
      }

      .cash {
        background: rgba(255, 255, 255, 0.15);
        padding: 4px 12px;
        border-radius: 999px;
        font-size: 14px;
        display: flex;
        align-items: center;
        gap: 4px;
      }

      .cash::before {
        content: "💵";
      }

      canvas {
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.08);
        box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.2);
      }

      .controls {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
        margin: 16px 0 32px;
        width: 320px;
      }

      button {
        border: none;
        border-radius: 16px;
        padding: 12px 8px;
        background: #fef08a;
        color: #4c1d95;
        font-weight: 700;
        font-size: 14px;
        cursor: pointer;
        box-shadow: 0 6px 0 rgba(0, 0, 0, 0.15);
        transition: transform 0.1s ease, box-shadow 0.1s ease;
      }

      button:active {
        transform: translateY(2px);
        box-shadow: 0 4px 0 rgba(0, 0, 0, 0.15);
      }

      .footer {
        display: flex;
        justify-content: space-between;
        width: 320px;
        font-size: 12px;
        opacity: 0.75;
      }

      .footer span::before {
        content: "•";
        margin-right: 6px;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="level">LEVEL 1</div>
      <div class="cash" id="cash">$0</div>
    </div>
    <canvas id="board" width="320" height="520"></canvas>
    <div class="controls">
      <button id="addBall">Add Ball</button>
      <button id="mergeBall">Merge Ball</button>
      <button id="addPin">Add Pin</button>
    </div>
    <div class="footer">
      <span>Drag для перемещения</span>
      <span>Кликните, чтобы ускорить</span>
    </div>

    <script>
      const canvas = document.getElementById('board');
      const ctx = canvas.getContext('2d');

      const width = canvas.width;
      const height = canvas.height;

      const gravity = 0.25;
      const damping = 0.75;
      const pegRadius = 6;
      const ballRadius = 10;

      const funnelWidth = 120;
      const funnelHeight = 80;

      const bottomZones = [
        { label: 'x4', multiplier: 4, color: '#fde047' },
        { label: 'x2', multiplier: 2, color: '#facc15' },
        { label: 'x2', multiplier: 2, color: '#facc15' },
        { label: 'x4', multiplier: 4, color: '#fde047' },
      ];

      const pegs = [];
      const balls = [];
      const coins = [];

      let score = 0;
      let incomePerSecond = 5;
      let lastDrop = 0;
      let autoDropInterval = 1600;

      function createDefaultPegs() {
        pegs.length = 0;
        for (let row = 0; row < 6; row++) {
          for (let col = 0; col < 6; col++) {
            const xOffset = row % 2 === 0 ? 0 : pegRadius * 2;
            const x = 60 + col * 40 + xOffset;
            const y = 160 + row * 50;
            pegs.push({ x, y });
          }
        }
      }

      function addBall(power = 1, x = width / 2) {
        balls.push({
          x,
          y: 100,
          vx: (Math.random() - 0.5) * 2,
          vy: 0,
          power,
        });
      }

      function addPeg() {
        const x = 60 + Math.random() * 200;
        const y = 160 + Math.random() * 200;
        pegs.push({ x, y });
      }

      function spawnCoin(x, y, amount) {
        coins.push({
          x,
          y,
          vy: -2 - Math.random() * 1.5,
          life: 60,
          amount,
        });
      }

      function updateBalls() {
        for (const ball of balls) {
          ball.vy += gravity;
          ball.x += ball.vx;
          ball.y += ball.vy;

          if (ball.x < ballRadius || ball.x > width - ballRadius) {
            ball.vx *= -damping;
            ball.x = Math.max(ballRadius, Math.min(width - ballRadius, ball.x));
          }

          if (ball.y > height - 110) {
            handleMultiplierCollision(ball);
          }

          for (const peg of pegs) {
            const dx = ball.x - peg.x;
            const dy = ball.y - peg.y;
            const dist = Math.hypot(dx, dy);
            if (dist < pegRadius + ballRadius) {
              const angle = Math.atan2(dy, dx);
              const force = 3;
              ball.vx = Math.cos(angle) * force;
              ball.vy = Math.sin(angle) * force;
            }
          }
        }

        for (let i = balls.length - 1; i >= 0; i--) {
          if (balls[i].y > height + 40) {
            balls.splice(i, 1);
          }
        }
      }

      function handleMultiplierCollision(ball) {
        const zoneWidth = width / bottomZones.length;
        const zoneIndex = Math.floor(ball.x / zoneWidth);
        const zone = bottomZones[zoneIndex];

        if (!zone) {
          return;
        }

        const reward = ball.power * zone.multiplier * 5;
        score += reward;
        spawnCoin(ball.x, height - 70, reward);
        updateCash();
        ball.y = height + 999;
      }

      function updateCoins() {
        for (const coin of coins) {
          coin.life -= 1;
          coin.y += coin.vy;
          coin.vy += 0.08;
        }

        for (let i = coins.length - 1; i >= 0; i--) {
          if (coins[i].life <= 0) {
            coins.splice(i, 1);
          }
        }
      }

      function updateCash() {
        const cash = document.getElementById('cash');
        cash.textContent = `$${score.toFixed(0)}`;
      }

      function drawFunnel() {
        ctx.strokeStyle = 'rgba(255,255,255,0.5)';
        ctx.lineWidth = 10;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(width / 2 - funnelWidth / 2, 20);
        ctx.lineTo(width / 2 - funnelWidth / 2, 100);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(width / 2 + funnelWidth / 2, 20);
        ctx.lineTo(width / 2 + funnelWidth / 2, 100);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(width / 2 - funnelWidth / 2, 20);
        ctx.quadraticCurveTo(width / 2, -20, width / 2 + funnelWidth / 2, 20);
        ctx.stroke();
      }

      function drawPegs() {
        ctx.fillStyle = '#60a5fa';
        for (const peg of pegs) {
          ctx.beginPath();
          ctx.arc(peg.x, peg.y, pegRadius, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      function drawBalls() {
        for (const ball of balls) {
          const gradient = ctx.createRadialGradient(
            ball.x - 4,
            ball.y - 4,
            2,
            ball.x,
            ball.y,
            ballRadius
          );
          gradient.addColorStop(0, '#f8fafc');
          gradient.addColorStop(1, '#c084fc');

          ctx.fillStyle = gradient;
          ctx.beginPath();
          ctx.arc(ball.x, ball.y, ballRadius, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      function roundRect(x, y, w, h, r) {
        const radius = Math.min(r, w / 2, h / 2);
        ctx.beginPath();
        ctx.moveTo(x + radius, y);
        ctx.lineTo(x + w - radius, y);
        ctx.quadraticCurveTo(x + w, y, x + w, y + radius);
        ctx.lineTo(x + w, y + h - radius);
        ctx.quadraticCurveTo(x + w, y + h, x + w - radius, y + h);
        ctx.lineTo(x + radius, y + h);
        ctx.quadraticCurveTo(x, y + h, x, y + h - radius);
        ctx.lineTo(x, y + radius);
        ctx.quadraticCurveTo(x, y, x + radius, y);
        ctx.closePath();
      }

      function drawBottomZones() {
        const zoneWidth = width / bottomZones.length;
        for (let i = 0; i < bottomZones.length; i++) {
          const zone = bottomZones[i];
          const x = i * zoneWidth;
          const y = height - 90;
          const h = 60;

          ctx.fillStyle = zone.color;
          roundRect(x + 8, y, zoneWidth - 16, h, 14);
          ctx.fill();

          ctx.fillStyle = '#4c1d95';
          ctx.font = 'bold 20px "Helvetica Neue"';
          ctx.textAlign = 'center';
          ctx.fillText(zone.label.toUpperCase(), x + zoneWidth / 2, y + 36);
        }
      }

      function drawCoins() {
        ctx.font = 'bold 16px "Helvetica Neue"';
        ctx.textAlign = 'center';
        for (const coin of coins) {
          const opacity = Math.max(0, coin.life / 60);
          ctx.fillStyle = `rgba(254, 240, 138, ${opacity})`;
          ctx.fillText(`+$${coin.amount}`, coin.x, coin.y);
        }
      }

      function drawShadow() {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
        ctx.fillRect(0, height - 30, width, 30);
      }

      function loop(timestamp) {
        ctx.clearRect(0, 0, width, height);

        drawFunnel();
        drawPegs();
        drawBalls();
        drawBottomZones();
        drawCoins();
        drawShadow();

        updateBalls();
        updateCoins();

        if (timestamp - lastDrop > autoDropInterval) {
          addBall();
          lastDrop = timestamp;
        }

        requestAnimationFrame(loop);
      }

      function mergeBalls() {
        if (balls.length < 2) return;
        balls.sort((a, b) => b.power - a.power);
        const [strongest, second] = balls;
        strongest.power += second.power;
        spawnCoin(strongest.x, strongest.y, strongest.power * 10);
        balls.splice(1, 1);
      }

      canvas.addEventListener('mousemove', (event) => {
        if (event.buttons !== 1) return;
        const rect = canvas.getBoundingClientRect();
        const x = event.clientX - rect.left;
        addBall(1, x);
      });

      document.getElementById('addBall').addEventListener('click', () => addBall());
      document.getElementById('mergeBall').addEventListener('click', () => mergeBalls());
      document.getElementById('addPin').addEventListener('click', () => addPeg());

      createDefaultPegs();
      updateCash();
      requestAnimationFrame(loop);
    </script>
  </body>
</html>
